<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Meyow Dimsum</title>

<!-- ===== PWA: bisa di-"Install" sebagai aplikasi di Android & iOS ===== -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0f1117" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Meyow Kasir" />
<!-- ===================================================================== -->
<style>
  /* ── Tokens ── */
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #f97316;
    --accent2: #fb923c;
    --green: #22c55e;
    --red: #ef4444;
    --text: #e8eaf2;
    --muted: #7c82a3;
    --radius: 12px;
    --font: 'Segoe UI', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* ── Login Screen ── */
  #login-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 24px;
    width: 100%;
    max-width: 340px;
    text-align: center;
  }
  .login-card img {
    width: 76px; height: 76px;
    border-radius: 18px;
    object-fit: cover;
    margin-bottom: 16px;
  }
  .login-card h2 { font-size: 18px; margin-bottom: 4px; }
  .login-card p.sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .login-card input {
    margin-bottom: 10px;
    text-align: center;
    letter-spacing: .08em;
  }
  .login-card button { width: 100%; }
  .login-error {
    color: var(--red);
    font-size: 12px;
    min-height: 16px;
    margin-bottom: 8px;
  }

  #app-content { display: none; }
  #app-content.visible { display: block; }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header .logo {
    width: 40px; height: 40px;
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: #fdf6e3;
  }
  header .logo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  header h1 { font-size: 17px; font-weight: 700; }
  header p { font-size: 12px; color: var(--muted); }
  header .header-right { margin-left: auto; }
  #retry-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 16px;
    padding: 6px 10px;
    cursor: pointer;
  }
  #retry-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    margin: 0 16px 0;
    gap: 8px;
    padding: 16px 0 0;
  }
  .tab {
    flex: 1;
    padding: 10px;
    border-radius: 10px 10px 0 0;
    border: 1px solid var(--border);
    border-bottom: none;
    background: var(--surface2);
    color: var(--muted);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    text-align: center;
    transition: all .2s;
  }
  .tab.active {
    background: var(--surface);
    color: var(--accent);
    border-color: var(--border);
  }

  /* ── Panel ── */
  .panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0 var(--radius) var(--radius) var(--radius);
    margin: 0 16px;
    padding: 20px 16px;
  }
  .panel.active { display: block; }

  /* ── Section title ── */
  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* ── Item Row ── */
  .item-row {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
  }
  .item-row .row-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .item-row .row-num {
    font-size: 11px;
    color: var(--muted);
    font-weight: 700;
  }
  .remove-btn {
    background: none;
    border: none;
    color: var(--red);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    padding: 2px 6px;
    border-radius: 6px;
  }
  .remove-btn:hover { background: rgba(239,68,68,.15); }

  /* ── Form Controls ── */
  select, input[type=number], input[type=text], input[type=password] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    appearance: none;
    -webkit-appearance: none;
  }
  select:focus, input:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
  label.field-label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px; }

  .field-group { display: flex; gap: 10px; }
  .field-group > * { flex: 1; }

  /* ── Price tag ── */
  .price-tag {
    font-size: 18px;
    font-weight: 800;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .subtotal-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 13px;
    color: var(--muted);
  }

  /* ── Add button ── */
  .add-btn {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    padding: 12px;
    font-size: 14px;
    cursor: pointer;
    margin-top: 4px;
    transition: all .2s;
  }
  .add-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Summary box ── */
  .summary-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin: 16px 0;
  }
  .summary-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    margin-top: 10px;
  }
  .summary-total .label { font-size: 14px; font-weight: 700; }
  .summary-total .value { font-size: 22px; font-weight: 900; color: var(--green); }

  /* ── Adjustment (Diskon / Admin) toggle ── */
  .diskon-row { margin: 14px 0; }
  .adj-toggle { display: flex; gap: 8px; margin-bottom: 10px; }
  .adj-btn {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--muted);
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    text-align: center;
    transition: all .15s;
  }
  .adj-btn.active[data-type="diskon"] { background: rgba(239,68,68,.15); border-color: var(--red); color: var(--red); }
  .adj-btn.active[data-type="admin"] { background: rgba(34,197,94,.15); border-color: var(--green); color: var(--green); }

  /* ── Payment section ── */
  .pay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0; }

  /* ── Submit ── */
  .submit-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 16px;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    transition: all .2s;
    letter-spacing: .02em;
  }
  .submit-btn:hover { background: var(--accent2); }
  .submit-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 600;
    transition: transform .3s ease;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--green); color: var(--green); }
  #toast.error { border-color: var(--red); color: var(--red); }

  /* ── Loading overlay ── */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<script>
// ─── Config (hardcoded — tidak perlu input manual lagi) ────
const API_URL = "https://script.google.com/macros/s/AKfycbzfq-LKs1Ejn9PPr9vNCoTrTAGMi5EstwDD1NxaBulSbsqd5-0LPeBWCsZOd9bGmD2A4Q/exec";
const LOGIN_PASSWORD = "meyowds";
const AUTH_KEY = "meyow_authed";

// ─── Konfigurasi Print Struk (RawBT — Iware C8LP 80mm) ────
const STORE_NAME = "Meyow Dimsum";
const RECEIPT_WIDTH = 32; // jumlah karakter per baris. Kalau hasil print kepotong, coba naikkan ke 48. Kalau tulisan kegedean/tidak muat, turunkan ke 24.
let lastStrukText = null; // menyimpan teks struk terakhir untuk fitur "Cetak Ulang"

// ─── State ───────────────────────────────────────────────
let products = [];
let bahanList = [];
let payments = [];
let banks = [];
let penjualanCount = 0;
let pengeluaranCount = 0;

// ─── Init ─────────────────────────────────────────────────
window.onload = () => {
  checkLogin();
};

// ─── Login ────────────────────────────────────────────────
function checkLogin() {
  if (localStorage.getItem(AUTH_KEY) === "true") {
    showApp();
  } else {
    document.getElementById("login-screen").style.display = "flex";
  }
}

function attemptLogin() {
  const val = document.getElementById("login-password").value;
  const err = document.getElementById("login-error");
  if (val === LOGIN_PASSWORD) {
    localStorage.setItem(AUTH_KEY, "true");
    err.textContent = "";
    showApp();
  } else {
    err.textContent = "Password salah, coba lagi.";
    document.getElementById("login-password").value = "";
    document.getElementById("login-password").focus();
  }
}

function showApp() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app-content").classList.add("visible");
  addPenjualanItem();
  addPengeluaranItem();
  loadData();
}

// ─── Data Loading (otomatis terhubung, tanpa input manual) ─
async function loadData() {
  try {
    document.getElementById("status-text").textContent = "Menghubungkan...";
    const [pRes, bRes, payRes] = await Promise.all([
      fetch(`${API_URL}?action=getProducts`),
      fetch(`${API_URL}?action=getBahan`),
      fetch(`${API_URL}?action=getPaymentMethods`)
    ]);
    const pData = await pRes.json();
    const bData = await bRes.json();
    const payData = await payRes.json();

    products = pData.products || [];
    bahanList = bData.bahan || [];
    payments = payData.payments || [];
    banks = payData.banks || [];

    populateDropdowns();
    document.getElementById("status-text").textContent = `✅ Terhubung ke spreadsheet — ${products.length} produk dimuat`;
    showToast("Berhasil terhubung ke spreadsheet", "success");
  } catch(e) {
    document.getElementById("status-text").textContent = "❌ Belum terhubung ke spreadsheet";
    showToast("Gagal terhubung. Cek koneksi internet.", "error");
  }
}

function populateDropdowns() {
  // Payment dropdowns for both panels
  ["p-pembayaran", "e-pembayaran"].forEach(id => {
    const el = document.getElementById(id);
    el.innerHTML = '<option value="">-- Pilih --</option>';
    payments.forEach(p => { el.innerHTML += `<option>${p}</option>`; });
  });
  ["p-bank", "e-bank"].forEach(id => {
    const el = document.getElementById(id);
    el.innerHTML = '<option value="">-- Pilih --</option>';
    banks.forEach(b => { el.innerHTML += `<option>${b}</option>`; });
  });

  // Populate searchable datalists (fitur pencarian produk/bahan)
  document.getElementById("produk-datalist").innerHTML =
    products.map(p => `<option value="${p.name}">${fmt(p.price)}</option>`).join("");
  document.getElementById("bahan-datalist").innerHTML =
    bahanList.map(b => `<option value="${b.name}">${b.biaya ? fmt(b.biaya) : ''}</option>`).join("");
}

// ─── Tabs ─────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll(".tab").forEach((t, i) => {
    t.classList.toggle("active", (i === 0 && name === "penjualan") || (i === 1 && name === "pengeluaran"));
  });
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.getElementById(`panel-${name}`).classList.add("active");
}

// ─── Adjustment type (Diskon / Admin) ──────────────────────
function setAdjType(type) {
  document.getElementById("p-adj-type").value = type;
  document.getElementById("btn-adj-diskon").classList.toggle("active", type === "diskon");
  document.getElementById("btn-adj-admin").classList.toggle("active", type === "admin");
  updatePenjualanSummary();
}

// ─── Penjualan Items ──────────────────────────────────────
function addPenjualanItem() {
  penjualanCount++;
  const id = penjualanCount;
  const container = document.getElementById("penjualan-items");
  const div = document.createElement("div");
  div.className = "item-row";
  div.id = `pj-row-${id}`;
  div.innerHTML = `
    <div class="row-head">
      <span class="row-num">Item #${id}</span>
      <button class="remove-btn" onclick="removeRow('pj-row-${id}', 'penjualan')">✕</button>
    </div>
    <div>
      <label class="field-label">Produk</label>
      <input type="text" class="produk-select" id="pj-produk-${id}" list="produk-datalist" placeholder="🔍 Cari produk..." autocomplete="off" oninput="onProdukChange(this, ${id})" onchange="onProdukChange(this, ${id})" />
    </div>
    <div class="field-group">
      <div>
        <label class="field-label">Qty</label>
        <input type="number" class="qty-input" id="pj-qty-${id}" min="1" value="1" onchange="updatePenjualanSummary()" />
      </div>
      <div>
        <label class="field-label">Harga (Rp)</label>
        <input type="number" class="harga-input" id="pj-harga-${id}" min="0" value="0" onchange="updatePenjualanSummary()" />
      </div>
    </div>
    <div class="subtotal-row">
      <span>Subtotal</span>
      <span class="price-tag" id="pj-sub-${id}">Rp 0</span>
    </div>
  `;
  container.appendChild(div);
  updatePenjualanSummary();
}

function onProdukChange(inputEl, id) {
  const match = products.find(p => p.name === inputEl.value);
  if (match) {
    document.getElementById(`pj-harga-${id}`).value = match.price;
  }
  updatePenjualanSummary();
}

function updatePenjualanSummary() {
  const rows = document.querySelectorAll("[id^='pj-row-']");
  let total = 0;
  let subtotalsHtml = "";
  rows.forEach(row => {
    const id = row.id.replace("pj-row-", "");
    const produkInput = document.getElementById(`pj-produk-${id}`);
    const produkName = produkInput ? produkInput.value : "";
    const qty = parseFloat(document.getElementById(`pj-qty-${id}`)?.value) || 0;
    const harga = parseFloat(document.getElementById(`pj-harga-${id}`)?.value) || 0;
    const sub = qty * harga;
    const subEl = document.getElementById(`pj-sub-${id}`);
    if (subEl) subEl.textContent = `Rp ${fmt(sub)}`;
    if (produkName) {
      subtotalsHtml += `<div class="subtotal-row"><span>${produkName} ×${qty}</span><span>${fmt(sub)}</span></div>`;
      total += sub;
    }
  });

  // Diskon / Admin — jika kosong, tidak ada penyesuaian sama sekali
  const adjType = document.getElementById("p-adj-type").value;
  const adjRaw = document.getElementById("p-diskon").value;
  const adjValue = adjRaw === "" ? 0 : (parseFloat(adjRaw) || 0);

  if (adjValue > 0) {
    const label = adjType === "diskon" ? "Diskon" : "Biaya Admin";
    const sign = adjType === "diskon" ? "-" : "+";
    subtotalsHtml += `<div class="subtotal-row"><span>${label}</span><span>${sign} Rp ${fmt(adjValue)}</span></div>`;
  }

  let grand = total;
  if (adjValue > 0) {
    grand = adjType === "diskon" ? Math.max(0, total - adjValue) : total + adjValue;
  }

  document.getElementById("penjualan-subtotals").innerHTML = subtotalsHtml;
  document.getElementById("p-grand-total").textContent = `Rp ${fmt(grand)}`;
}

// ─── Pengeluaran Items ────────────────────────────────────
function addPengeluaranItem() {
  pengeluaranCount++;
  const id = pengeluaranCount;
  const container = document.getElementById("pengeluaran-items");
  const div = document.createElement("div");
  div.className = "item-row";
  div.id = `pe-row-${id}`;
  div.innerHTML = `
    <div class="row-head">
      <span class="row-num">Item #${id}</span>
      <button class="remove-btn" onclick="removeRow('pe-row-${id}', 'pengeluaran')">✕</button>
    </div>
    <div>
      <label class="field-label">Bahan / Item</label>
      <input type="text" class="bahan-select" id="pe-bahan-${id}" list="bahan-datalist" placeholder="🔍 Cari atau ketik bahan..." autocomplete="off" oninput="onBahanChange(this, ${id})" onchange="onBahanChange(this, ${id})" />
    </div>
    <div class="field-group">
      <div>
        <label class="field-label">Jumlah</label>
        <input type="number" class="qty-input" id="pe-qty-${id}" min="1" value="1" onchange="updatePengeluaranSummary()" />
      </div>
      <div>
        <label class="field-label">Harga Satuan (Rp)</label>
        <input type="number" class="harga-input" id="pe-harga-${id}" min="0" value="0" onchange="updatePengeluaranSummary()" />
      </div>
    </div>
    <div class="subtotal-row">
      <span>Subtotal</span>
      <span class="price-tag" id="pe-sub-${id}">Rp 0</span>
    </div>
  `;
  container.appendChild(div);
  updatePengeluaranSummary();
}

function onBahanChange(inputEl, id) {
  const match = bahanList.find(b => b.name === inputEl.value);
  if (match && match.biaya > 0) {
    document.getElementById(`pe-harga-${id}`).value = match.biaya;
  }
  updatePengeluaranSummary();
}

function updatePengeluaranSummary() {
  const rows = document.querySelectorAll("[id^='pe-row-']");
  let total = 0;
  let subtotalsHtml = "";
  rows.forEach(row => {
    const id = row.id.replace("pe-row-", "");
    const nameInput = document.getElementById(`pe-bahan-${id}`);
    const name = nameInput ? nameInput.value.trim() : "";
    const qty = parseFloat(document.getElementById(`pe-qty-${id}`)?.value) || 0;
    const harga = parseFloat(document.getElementById(`pe-harga-${id}`)?.value) || 0;
    const sub = qty * harga;
    const subEl = document.getElementById(`pe-sub-${id}`);
    if (subEl) subEl.textContent = `Rp ${fmt(sub)}`;
    if (name) {
      subtotalsHtml += `<div class="subtotal-row"><span>${name} ×${qty}</span><span>${fmt(sub)}</span></div>`;
      total += sub;
    }
  });
  document.getElementById("pengeluaran-subtotals").innerHTML = subtotalsHtml;
  document.getElementById("e-grand-total").textContent = `Rp ${fmt(total)}`;
}

// ─── Remove Row ───────────────────────────────────────────
function removeRow(rowId, type) {
  const el = document.getElementById(rowId);
  if (!el) return;
  const siblings = document.querySelectorAll(`[id^="${rowId.split('-').slice(0,2).join('-')}-"]`);
  if (siblings.length <= 1) { showToast("Minimal 1 item", "error"); return; }
  el.remove();
  if (type === "penjualan") updatePenjualanSummary();
  else updatePengeluaranSummary();
}

// ─── Cetak Struk (RawBT → Printer Bluetooth 80mm) ─────────

// Ratakan teks kiri & kanan dalam satu baris selebar `width` karakter.
// Kalau tidak muat, teks kanan otomatis turun ke baris baru.
function padLine(left, right, width = RECEIPT_WIDTH) {
  left = String(left);
  right = String(right);
  if (left.length + right.length + 1 > width) {
    return left + "\n" + right.padStart(width, " ");
  }
  return left + " ".repeat(width - left.length - right.length) + right;
}

function centerText(text, width = RECEIPT_WIDTH) {
  text = String(text);
  if (text.length >= width) return text;
  const padTotal = width - text.length;
  return " ".repeat(Math.floor(padTotal / 2)) + text;
}

// Susun teks struk polos (plain text) dari data penjualan
function buildStrukText(items, adjType, adjValue, grandTotal, pembayaran, bank) {
  const W = RECEIPT_WIDTH;
  const line = "-".repeat(W);
  const now = new Date().toLocaleString("id-ID", {
    day: "2-digit", month: "2-digit", year: "numeric",
    hour: "2-digit", minute: "2-digit"
  });

  let out = "";
  out += centerText(STORE_NAME, W) + "\n";
  out += centerText("Struk Penjualan", W) + "\n";
  out += line + "\n";
  out += now + "\n";
  out += line + "\n";

  items.forEach(it => {
    out += padLine(`${it.produk} x${it.jumlah}`, fmt(it.jumlah * it.harga), W) + "\n";
  });
  out += line + "\n";

  if (adjValue > 0) {
    const label = adjType === "diskon" ? "Diskon" : "Biaya Admin";
    const sign = adjType === "diskon" ? "-" : "+";
    out += padLine(label, sign + fmt(adjValue), W) + "\n";
    out += line + "\n";
  }

  out += padLine("TOTAL", "Rp " + fmt(grandTotal), W) + "\n";
  out += padLine("Bayar", pembayaran + (bank ? " - " + bank : ""), W) + "\n";
  out += line + "\n";
  out += centerText("Terima kasih!", W) + "\n";
  out += "\n\n\n"; // spasi kosong untuk sobek kertas

  return out;
}

// Kirim teks struk ke printer lewat aplikasi RawBT (harus sudah terinstall & printer sudah paired)
function printToRawBT(text) {
  try {
    const encoded = encodeURIComponent(text);
    const intentUrl = `intent:${encoded}#Intent;scheme=rawbt;package=ru.a402d.rawbtprinter;end;`;
    window.location.href = intentUrl;
  } catch (e) {
    console.error("Gagal mengirim ke RawBT:", e);
    showToast("Gagal cetak struk", "error");
  }
}

// Tombol "Cetak Ulang Struk Terakhir"
function reprintLastStruk() {
  if (!lastStrukText) {
    showToast("Belum ada struk untuk dicetak", "error");
    return;
  }
  printToRawBT(lastStrukText);
}

// ─── Submit Penjualan ─────────────────────────────────────
async function submitPenjualan() {
  if (!API_URL) { showToast("Hubungkan ke spreadsheet dulu", "error"); return; }
  const rows = document.querySelectorAll("[id^='pj-row-']");
  const items = [];

  rows.forEach(row => {
    const id = row.id.replace("pj-row-", "");
    const produkInput = document.getElementById(`pj-produk-${id}`);
    const produk = produkInput?.value || "";
    const jumlah = parseFloat(document.getElementById(`pj-qty-${id}`)?.value) || 0;
    const harga = parseFloat(document.getElementById(`pj-harga-${id}`)?.value) || 0;
    if (!produk || jumlah <= 0) return; // skip empty rows
    items.push({ produk, jumlah, harga, diskon: 0, adminFee: 0 });
  });

  if (items.length === 0) { showToast("Pilih minimal 1 produk", "error"); return; }

  const adjType = document.getElementById("p-adj-type").value;
  const adjRaw = document.getElementById("p-diskon").value;
  const adjValue = adjRaw === "" ? 0 : (parseFloat(adjRaw) || 0);
  // Penyesuaian (diskon mengurangi, admin menambah) diterapkan pada item pertama
  if (adjValue > 0 && items.length > 0) {
    if (adjType === "diskon") items[0].diskon = adjValue;
    else items[0].adminFee = adjValue;
  }

  const pembayaran = document.getElementById("p-pembayaran").value;
  const bank = document.getElementById("p-bank").value;
  items.forEach(i => { i.pembayaran = pembayaran; i.bank = bank; });

  const btn = document.getElementById("btn-penjualan");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Menyimpan...';

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({ action: "addPenjualan", data: items })
    });
    const data = await res.json();
    if (data.success) {
      showToast(`✅ ${data.message}`, "success");
      const grand = items.reduce((acc, it) => acc + it.jumlah * it.harga, 0)
        - (adjType === "diskon" ? (items[0].diskon || 0) : 0)
        + (adjType === "admin" ? (items[0].adminFee || 0) : 0);
      lastStrukText = buildStrukText(items, adjType, adjValue, grand, pembayaran, bank);
      printToRawBT(lastStrukText);
      resetPenjualan();
    } else {
      showToast("Gagal: " + data.error, "error");
    }
  } catch(e) {
    showToast("Error: " + e.message, "error");
  } finally {
    btn.disabled = false;
    btn.innerHTML = "Simpan Penjualan ke Sheet";
  }
}

// ─── Submit Pengeluaran ───────────────────────────────────
async function submitPengeluaran() {
  if (!API_URL) { showToast("Hubungkan ke spreadsheet dulu", "error"); return; }
  const rows = document.querySelectorAll("[id^='pe-row-']");
  const items = [];

  rows.forEach(row => {
    const id = row.id.replace("pe-row-", "");
    const bahan = document.getElementById(`pe-bahan-${id}`)?.value.trim() || "";
    const jumlah = parseFloat(document.getElementById(`pe-qty-${id}`)?.value) || 0;
    const hargaSatuan = parseFloat(document.getElementById(`pe-harga-${id}`)?.value) || 0;
    if (!bahan || jumlah <= 0) return;
    items.push({ bahan, jumlah, hargaSatuan });
  });

  if (items.length === 0) { showToast("Isi minimal 1 item", "error"); return; }

  const pembayaran = document.getElementById("e-pembayaran").value;
  const bank = document.getElementById("e-bank").value;
  items.forEach(i => { i.pembayaran = pembayaran; i.bank = bank; });

  const btn = document.getElementById("btn-pengeluaran");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Menyimpan...';

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({ action: "addPengeluaran", data: items })
    });
    const data = await res.json();
    if (data.success) {
      showToast(`✅ ${data.message}`, "success");
      resetPengeluaran();
    } else {
      showToast("Gagal: " + data.error, "error");
    }
  } catch(e) {
    showToast("Error: " + e.message, "error");
  } finally {
    btn.disabled = false;
    btn.innerHTML = "Simpan Pengeluaran ke Sheet";
  }
}

// ─── Reset ────────────────────────────────────────────────
function resetPenjualan() {
  document.getElementById("penjualan-items").innerHTML = "";
  penjualanCount = 0;
  document.getElementById("p-diskon").value = "";
  setAdjType("diskon");
  addPenjualanItem();
}
function resetPengeluaran() {
  document.getElementById("pengeluaran-items").innerHTML = "";
  pengeluaranCount = 0;
  addPengeluaranItem();
}

// ─── Utils ────────────────────────────────────────────────
function fmt(n) {
  return Number(n).toLocaleString("id-ID");
}

function showToast(msg, type = "success") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `show ${type}`;
  setTimeout(() => { t.className = ""; }, 3000);
}

// ─── Daftarkan Service Worker (agar bisa di-Install sebagai app) ──
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch((err) => {
      console.warn("Gagal mendaftarkan service worker:", err);
    });
  });
}
